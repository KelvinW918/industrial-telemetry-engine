version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:2.15.0-pg16
    container_name: industrial_telemetry_db
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d telemetry"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  timescale_data: